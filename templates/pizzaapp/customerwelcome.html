{% extends 'base.html' %}

{% block content %}

<nav class="navbar navbar-light bg-light">
	<a class="navbar-brand">Welcome {{username}}</a>
	<a class="nav-item" style="color: black;text-decoration: none" href="/userorders/">my orders</a>
	<a href="/userlogout/" class="btn btn-danger">logout</a>
</nav>

{% for message in messages %}
<p style="color: green;text-align: center">{{message}}</p>
{% endfor %}

<form method="post" action="/placeorder/">
	{% csrf_token %}
	<div class="container" style="margin: auto;width: 600px">
		<table style="width: 100%">
			<tr>
				<th>pizza</th>
				<th>price</th>
				<th>quantity</th>
			</tr>
			{% for pizza in pizzas %}
			<tr>
				<td>{{pizza.name}}</td>
				<td>{{pizza.price}}</td>
				<td>
					<label for="pizza_qty_{{pizza.id}}" class="sr-only">Quantity for {{pizza.name}}</label>
					<input type="number" id="pizza_qty_{{pizza.id}}" min="0" value="0" name="{{pizza.id}}" style="width: 60px">
				</td>
			</tr>
			{% endfor %}
		</table>

		<label for="customer_address" class="sr-only">Delivery Address</label>
		<input type="text" id="customer_address" placeholder="address" style="width: 400px;margin-top: 110px" name="address">

		<input type="submit" style="float: right;margin-top: 100px" class="btn btn-outline-success" value="place order" name="">
	</div>
</form>

{% endblock %}
